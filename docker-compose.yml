services:
  backend:
    build: ./backend
    container_name: birdquiz-backend
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - EBIRD_API_KEY=${EBIRD_API_KEY:-}
      - XC_API_KEY=${XC_API_KEY:-}
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - birdquiz-net

  web:
    image: nginx:alpine
    container_name: birdquiz-web
    ports:
      - "${WEB_PORT:-32095}:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - birdquiz-net

networks:
  birdquiz-net:
    driver: bridge
